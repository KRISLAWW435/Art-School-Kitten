<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preload" as="image" href="https://raw.githubusercontent.com/KRISLAWW435/Cat-assets-/main/bg/bg1.webp" />
    <link rel="preload" as="image" href="https://raw.githubusercontent.com/KRISLAWW435/Cat-assets-/main/cat/cat.webp" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a polyfill or library attempts to assign to window.fetch in an environment where it's read-only.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (typeof originalFetch === 'function') {
            let currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentFetch;
              },
              set: function(v) {
                currentFetch = v;
              }
            });
          }
        } catch (e) {
          // If defineProperty fails (e.g. not configurable), we can't do much.
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art School AI Kitten</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
