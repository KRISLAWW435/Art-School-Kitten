    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a polyfill attempts to assign to window.fetch in an environment where it's read-only.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // If defineProperty fails, we can't do much, but at least we tried.
          console.warn('Global fetch fix failed:', e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
